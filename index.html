<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>shapes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2e00ff;
            --accent: #00ff41;
            --text: #ffffff;
            --transition-speed: 0.4s;
        }

        /* Automatic Theme Variations */
        .theme-0 { --bg: #2e00ff; --accent: #00ff41; --text: #ffffff; } /* Circle: Green Shape, White Text */
        .theme-1 { --bg: #ff4d00; --accent: #7000ff; --text: #ffffff; } /* Triangle: Purple Shape, White Text */
        .theme-2 { --bg: #ff00ff; --accent: #ffff00; --text: #2e00ff; } /* Square: Yellow Shape, Blue Text */
        .theme-3 { --bg: #00ff41; --accent: #2e00ff; --text: #ffffff; } /* Pentagon: Blue Shape, White Text */
        .theme-4 { --bg: #7000ff; --accent: #ff4d00; --text: #ffffff; } /* Hexagon: Orange Shape, White Text */
        .theme-5 { --bg: #ffff00; --accent: #ff00ff; --text: #2e00ff; } /* Heptagon: Magenta Shape, Blue Text */
        .theme-6 { --bg: #00ffff; --accent: #ff0000; --text: #2e00ff; } /* Octagon: Red Shape, Blue Text */
        .theme-7 { --bg: #ff0000; --accent: #00ff41; --text: #ffffff; } /* Nonagon: Green Shape, White Text */
        .theme-8 { --bg: #2e00ff; --accent: #ffffff; --text: #00ff41; } /* Decagon: White Shape, Green Text */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background-color var(--transition-speed) ease;
            touch-action: none;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        .pane {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
            width: 100%;
            height: 100%;
            outline: none;
        }

        .name-pane {
            /* Perfectly centered in the left half */
        }

        .shape-name {
            font-size: clamp(2rem, 7vw, 7rem);
            text-transform: lowercase;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            padding: 0 2rem;
        }

        .shape-pane {
            /* Perfectly centered in the right half */
        }

        .shape-container {
            width: 35vw;
            height: 35vw;
            max-width: 450px;
            max-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 768px) {
            .shape-container {
                width: 60vw;
                height: 60vw;
            }
        }

        .shape-svg {
            width: 100%;
            height: 100%;
        }

        .shape-path {
            fill: var(--accent);
            stroke: none;
            transition: d 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        fill var(--transition-speed) ease;
        }

        /* Navigation feedback */
        .pane:active {
            opacity: 0.7;
        }
    </style>
</head>
<body class="theme-0">
    <main>
        <section class="pane name-pane" id="prev-btn">
            <h1 class="shape-name" id="display-name">circle</h1>
        </section>
        <section class="pane shape-pane" id="next-btn">
            <div class="shape-container">
                <svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="" class="shape-path" id="display-shape" />
                </svg>
            </div>
        </section>
    </main>

    <script>
        const SHAPES = [
            { name: "circle", sides: 0 },
            { name: "triangle", sides: 3 },
            { name: "square", sides: 4 },
            { name: "pentagon", sides: 5 },
            { name: "hexagon", sides: 6 },
            { name: "heptagon", sides: 7 },
            { name: "octagon", sides: 8 },
            { name: "nonagon", sides: 9 },
            { name: "decagon", sides: 10 }
        ];

        let currentIndex = 0;

        const displayName = document.getElementById('display-name');
        const displayShape = document.getElementById('display-shape');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function getPolygonPath(sides) {
            if (sides === 0) return "M 50,50 m -40,0 a 40,40 0 1,0 80,0 a 40,40 0 1,0 -80,0";
            if (SHAPES[currentIndex].customPath) return SHAPES[currentIndex].customPath;

            const points = [];
            const radius = 40;
            const centerX = 50;
            const centerY = 50;
            const startAngle = -Math.PI / 2;

            for (let i = 0; i < sides; i++) {
                const angle = startAngle + (i * 2 * Math.PI) / sides;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                points.push(`${x.toFixed(2)},${y.toFixed(2)}`);
            }

            return `M ${points.join(' L ')} Z`;
        }

        function updateDisplay() {
            const shape = SHAPES[currentIndex];
            
            // Update Text & Path
            displayName.textContent = shape.name;
            displayShape.setAttribute('d', getPolygonPath(shape.sides));
            
            // Update Theme
            document.body.className = `theme-${currentIndex}`;
        }

        function navigate(direction) {
            if (direction === 'next') {
                currentIndex = (currentIndex + 1) % SHAPES.length;
            } else {
                currentIndex = (currentIndex - 1 + SHAPES.length) % SHAPES.length;
            }
            updateDisplay();
            playShapeSound(currentIndex);
        }

        // --- Audio ---
        let audioCtx = null;
        let reverbNode = null;

        // Each shape: fundamental freq + partials {r: frequency ratio, g: peak gain, d: decay seconds}
        // Designed so the timbre "resembles" the shape's character
        const SHAPE_SOUNDS = [
            // circle — pure, smooth, no edges: clean sine + gentle overtones, long decay
            { freq: 587.3, partials: [{r:1, g:0.5, d:2.8}, {r:2, g:0.12, d:2.0}, {r:3, g:0.04, d:1.2}] },
            // triangle — sharp, pointy: bright high pitch, odd harmonics (1,3,5) like a triangle wave
            { freq: 880.0, partials: [{r:1, g:0.4, d:1.0}, {r:3, g:0.22, d:0.65}, {r:5, g:0.1, d:0.4}] },
            // square — rigid, hollow: grounded pitch, even harmonics give body
            { freq: 392.0, partials: [{r:1, g:0.45, d:1.8}, {r:2, g:0.28, d:1.2}, {r:4, g:0.09, d:0.7}] },
            // pentagon — balanced, open: mid-range, slightly spread partials
            { freq: 784.0, partials: [{r:1, g:0.45, d:2.1}, {r:1.5, g:0.18, d:1.5}, {r:2, g:0.09, d:0.9}] },
            // hexagon — crystalline, bell: inharmonic ratios like a real bell (2.76x, 5.4x)
            { freq: 523.3, partials: [{r:1, g:0.5, d:3.0}, {r:2.76, g:0.28, d:2.1}, {r:5.4, g:0.08, d:1.0}] },
            // heptagon — mysterious, unusual: 7th harmonic adds otherworldly edge
            { freq: 466.2, partials: [{r:1, g:0.45, d:2.2}, {r:2, g:0.18, d:1.5}, {r:3.5, g:0.1, d:0.8}, {r:7, g:0.06, d:0.4}] },
            // octagon — high, octave-suggesting: bright with sub-octave shimmer
            { freq: 1046.5, partials: [{r:1, g:0.38, d:1.3}, {r:2, g:0.18, d:0.85}, {r:0.5, g:0.14, d:1.1}] },
            // nonagon — complex, shimmering: many close partials create rich chorus
            { freq: 740.0, partials: [{r:1, g:0.32, d:2.0}, {r:1.5, g:0.16, d:1.4}, {r:2, g:0.12, d:1.0}, {r:2.5, g:0.08, d:0.6}, {r:3.5, g:0.05, d:0.4}] },
            // decagon — full, almost-circle: warm with many harmonics fading into roundness
            { freq: 659.3, partials: [{r:1, g:0.4, d:2.8}, {r:2, g:0.18, d:2.0}, {r:3, g:0.1, d:1.4}, {r:4, g:0.06, d:0.9}, {r:5, g:0.03, d:0.5}] }
        ];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Synthetic reverb impulse for wind-chime spaciousness
            reverbNode = audioCtx.createConvolver();
            const sampleRate = audioCtx.sampleRate;
            const length = Math.floor(sampleRate * 2.5);
            const impulse = audioCtx.createBuffer(2, length, sampleRate);
            for (let c = 0; c < 2; c++) {
                const ch = impulse.getChannelData(c);
                for (let i = 0; i < length; i++) {
                    ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 1.5);
                }
            }
            reverbNode.buffer = impulse;

            const wetGain = audioCtx.createGain();
            wetGain.gain.value = 0.25;
            reverbNode.connect(wetGain);
            wetGain.connect(audioCtx.destination);
        }

        function playShapeSound(index) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const { freq, partials } = SHAPE_SOUNDS[index];
            const now = audioCtx.currentTime;

            partials.forEach(({ r, g, d }) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.value = freq * r;

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(g, now + 0.006);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + d);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.connect(reverbNode);

                osc.start(now);
                osc.stop(now + d + 0.1);
            });
        }

        // Event Listeners
        prevBtn.addEventListener('click', () => navigate('prev'));
        nextBtn.addEventListener('click', () => navigate('next'));

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === ' ') navigate('prev');
            if (e.key === 'ArrowRight' || e.key === 'Enter') navigate('next');
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
