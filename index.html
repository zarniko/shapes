<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>geometry-shapes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2e00ff;
            --accent: #00ff41;
            --text: #ffffff;
            --transition-speed: 0.4s;
        }

        /* Automatic Theme Variations */
        .theme-0 { --bg: #2e00ff; --accent: #00ff41; --text: #ffffff; } /* Circle: Green Shape, White Text */
        .theme-1 { --bg: #ff4d00; --accent: #7000ff; --text: #ffffff; } /* Triangle: Purple Shape, White Text */
        .theme-2 { --bg: #ff00ff; --accent: #ffff00; --text: #2e00ff; } /* Square: Yellow Shape, Blue Text */
        .theme-3 { --bg: #00ff41; --accent: #2e00ff; --text: #ffffff; } /* Pentagon: Blue Shape, White Text */
        .theme-4 { --bg: #7000ff; --accent: #ff4d00; --text: #ffffff; } /* Hexagon: Orange Shape, White Text */
        .theme-5 { --bg: #ffff00; --accent: #ff00ff; --text: #2e00ff; } /* Heptagon: Magenta Shape, Blue Text */
        .theme-6 { --bg: #00ffff; --accent: #ff0000; --text: #2e00ff; } /* Octagon: Red Shape, Blue Text */
        .theme-7 { --bg: #ff0000; --accent: #00ff41; --text: #ffffff; } /* Nonagon: Green Shape, White Text */
        .theme-8 { --bg: #2e00ff; --accent: #ffffff; --text: #00ff41; } /* Decagon: White Shape, Green Text */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background-color var(--transition-speed) ease;
            touch-action: none;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        .pane {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
            width: 100%;
            height: 100%;
            outline: none;
        }

        .name-pane {
            /* Perfectly centered in the left half */
        }

        .shape-name {
            font-size: clamp(2rem, 7vw, 7rem);
            text-transform: lowercase;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            padding: 0 2rem;
        }

        .shape-pane {
            /* Perfectly centered in the right half */
        }

        .shape-container {
            width: 35vw;
            height: 35vw;
            max-width: 450px;
            max-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 768px) {
            .shape-container {
                width: 60vw;
                height: 60vw;
            }
        }

        .shape-svg {
            width: 100%;
            height: 100%;
        }

        .shape-path {
            fill: var(--accent);
            stroke: none;
            transition: d 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        fill var(--transition-speed) ease;
        }

        /* Navigation feedback */
        .pane:active {
            opacity: 0.7;
        }
    </style>
</head>
<body class="theme-0">
    <main>
        <section class="pane name-pane" id="prev-btn">
            <h1 class="shape-name" id="display-name">circle</h1>
        </section>
        <section class="pane shape-pane" id="next-btn">
            <div class="shape-container">
                <svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="" class="shape-path" id="display-shape" />
                </svg>
            </div>
        </section>
    </main>

    <script>
        const SHAPES = [
            { name: "circle", sides: 0 },
            { name: "triangle", sides: 3 },
            { name: "square", sides: 4 },
            { name: "pentagon", sides: 5 },
            { name: "hexagon", sides: 6 },
            { name: "heptagon", sides: 7 },
            { name: "octagon", sides: 8 },
            { name: "nonagon", sides: 9 },
            { name: "decagon", sides: 10 }
        ];

        let currentIndex = 0;

        const displayName = document.getElementById('display-name');
        const displayShape = document.getElementById('display-shape');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function getPolygonPath(sides) {
            if (sides === 0) return "M 50,50 m -40,0 a 40,40 0 1,0 80,0 a 40,40 0 1,0 -80,0";
            if (SHAPES[currentIndex].customPath) return SHAPES[currentIndex].customPath;

            const points = [];
            const radius = 40;
            const centerX = 50;
            const centerY = 50;
            const startAngle = -Math.PI / 2;

            for (let i = 0; i < sides; i++) {
                const angle = startAngle + (i * 2 * Math.PI) / sides;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                points.push(`${x.toFixed(2)},${y.toFixed(2)}`);
            }

            return `M ${points.join(' L ')} Z`;
        }

        function updateDisplay() {
            const shape = SHAPES[currentIndex];
            
            // Update Text & Path
            displayName.textContent = shape.name;
            displayShape.setAttribute('d', getPolygonPath(shape.sides));
            
            // Update Theme
            document.body.className = `theme-${currentIndex}`;
        }

        function navigate(direction) {
            if (direction === 'next') {
                currentIndex = (currentIndex + 1) % SHAPES.length;
            } else {
                currentIndex = (currentIndex - 1 + SHAPES.length) % SHAPES.length;
            }
            updateDisplay();
        }

        // Event Listeners
        prevBtn.addEventListener('click', () => navigate('prev'));
        nextBtn.addEventListener('click', () => navigate('next'));

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === ' ') navigate('prev');
            if (e.key === 'ArrowRight' || e.key === 'Enter') navigate('next');
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
